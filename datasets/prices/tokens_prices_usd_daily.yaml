name: dune.ether_fi.result_tokens_prices_usd_daily
display_name: Tokens Prices USD (Daily)
description: Daily aggregated raw/direct USD token price feed for the ether.fi token universe.
refresh_interval_minutes: 60
freshness_timestamp_column: last_updated
source_query_id: 6156128
source_query_url: https://dune.com/queries/6156128
freshness_source_name: Tokens Prices USD (Daily)
table_name: dune.ether_fi.result_tokens_prices_usd_daily
query_ready: true
query_patterns:
  - raw daily USD token prices
  - direct daily price feed
  - daily price interval join
grain: one row per token contract, blockchain, and daily price interval
refresh cadence: hourly
accuracy label: high
completeness label: high
use_when:
  - when the user wants daily raw/direct USD token prices without enrichment-derived fallback
  - when joining daily facts to direct USD prices
  - when validating daily direct price feed availability
do_not_use_when:
  - when derived/enriched fallback pricing is needed
  - when token-to-underlying exchange rates are needed
important_columns:
  - day: start of the daily price interval
  - blockchain: chain where the contract address is interpreted
  - contract_address: token contract address
  - price: direct USD price for the daily interval
  - next_day: end of the daily price interval used for forward interval joins
  - last_updated: timestamp for freshness evaluation
query_notes:
  - "For full daily interval coverage, prefer `fact.day >= prices.day and fact.day < prices.next_day`."
  - "A simple same-day join on `fact.day = prices.day` is often fine, but the `next_day` interval join handles midnight edge cases."
  - "There can be up to about a 1 hour delay at midnight, so `next_day` matters for edge cases."
  - "`price` is the daily raw/direct USD price feed value, not an enriched derived price."
semantic_notes:
  - This is the daily aggregated version of `dune.ether_fi.result_tokens_prices_usd`.
  - It is useful for direct price feed diagnostics and daily joins where enrichment is not desired.
caveats:
  - This table does not provide enriched fallback prices for tokens lacking a direct USD feed.
  - Price availability still depends on the token universe in `dune.ether_fi.result_tokens_prices_tokens_list`.
schema:
  - name: day
    type: timestamp
  - name: blockchain
    type: varchar
  - name: contract_address
    type: varbinary
  - name: price
    type: double
  - name: next_day
    type: timestamp
  - name: last_updated
    type: timestamp
related_datasets:
  - dune.ether_fi.result_tokens_prices_tokens_list
  - dune.ether_fi.result_tokens_prices_usd
  - dune.ether_fi.result_tokens_prices_enriched_daily
search_keywords:
  - daily raw price
  - direct daily price feed
  - next_day join
  - USD price
related_dashboards:
  - etherfi_overview
