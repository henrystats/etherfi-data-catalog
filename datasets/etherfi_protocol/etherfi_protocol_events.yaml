example_user_intents:
  - Show deposits and withdrawals for one ether.fi strategy.
  - How much was deposited into eETH-related strategies this week?
  - Compare withdrawal requests versus processed withdrawals by strategy_symbol.
  - Show recent eETH protocol deposits.
  - Summarize withdrawal requests for liquidETH.
  - Show recent protocol activity for this strategy.
  - Should I filter protocol events by project or strategy_symbol?
  - What is the difference between withdrawal_request and withdrawal_processed?
search_keywords:
  - deposit
  - recent eETH deposits
  - best filter for protocol events
  - project or strategy_symbol
  - withdrawal_request
  - withdrawal_processed
  - strategy_symbol
  - strategy_address
related_dashboards:
