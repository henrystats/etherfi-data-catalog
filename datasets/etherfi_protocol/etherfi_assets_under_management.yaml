    type: timestamp
  - name: blockchain
    type: varchar
  - name: address
    type: varbinary
  - name: address_name
    type: varchar
  - name: parent_address
    type: varbinary
  - name: parent_name
    type: varchar
  - name: parent_symbol
    type: varchar
  - name: token_address
    type: varbinary
  - name: token_symbol
    type: varchar
  - name: token_type
    type: varchar
  - name: token_project
    type: varchar
  - name: secondary_trait
    type: varchar
  - name: token_balance_raw
    type: double
  - name: token_balance
    type: double
  - name: token_balance_underlying
    type: double
  - name: token_underlying_symbol
    type: varchar
  - name: token_balance_usd
    type: double
  - name: token_balance_eth
    type: double
  - name: filter_balance
    type: boolean
  - name: last_updated
    type: timestamp
use_when:
  - when the user explicitly wants tracked AUM balance state by managed/internal/protocol-controlled address, token, chain, or parent product
  - when the prompt says AUM, assets under management, managed by ether.fi, ether.fi-owned address, protocol-owned address, internal address, treasury, address registry, address_name, address traits, or protocol-controlled assets
  - when the user wants the latest balances for a tracked ether.fi Cash address
  - when the user wants top Cash holders by balance after filtering `address_name = 'CASH'`
  - when the user wants monthly ether.fi Cash holdings over time
  - when the user wants Cash holdings grouped into liquidUSD, liquidETH, liquidBTC, and stables for charting
  - when the user asks where liquidETH funds are deployed
  - when the user asks where liquidUSD funds are deployed
  - when the user asks where liquidBTC funds are deployed
  - when the user asks how much of a product's tracked AUM is held in a given protocol or address classification
  - when the user asks how much liquidUSD, liquidETH, or liquidBTC is deployed in Aave, Morpho, or another token_project protocol
  - when the user wants parent-product balance footprint across multiple child addresses
do_not_use_when:
  - when the user asks generic user wallet/address holdings such as "how much does this address have in ether.fi?", "what ether.fi tokens does this wallet hold?", or "how much has this address invested in ether.fi?"; use `etherfi_protocol_token_holders`
  - when the user needs canonical product/token TVL; use dune.ether_fi.result_etherfi_protocol_token_tvl
  - when the user needs exact supply, supply_usd, or underlying supply; use dune.ether_fi.result_etherfi_protocol_token_tvl
  - when the user asks for spend, borrow, repay, cashback, liquidation, or other Cash event activity; use dune.ether_fi.result_etherfi_cash_events
  - when the user asks for protocol event flow such as deposits, withdrawals, mints, or redemptions; use dune.ether_fi.result_etherfi_protocol_events
  - when the user needs event volume or activity counts rather than balance-state snapshots
important_columns:
  - address_name: Balance-side address classification context for the tracked address; use `address_name = 'CASH'` for Cash balance use cases.
  - parent_address: Parent rollup address for product/vault deployment analysis; often the same as address for simple addresses, but multi-address products roll child addresses up to this parent.
  - parent_name: Human-readable parent product or protocol rollup context; do not confuse this with address_name classification.
  - parent_symbol: Often the best filter for product deployment-footprint questions, such as `liquidETH`, `liquidUSD`, or `liquidBTC`.
  - blockchain: Chain where the tracked balance row lives; useful for chain-level deployment footprint and multi-chain Cash balance analysis.
  - token_symbol: Symbol of the held token balance; acceptable ergonomic filter for core ether.fi balance questions.
  - token_project: Protocol where the balance is deployed; prefer this field for protocol-deployment filters and groupings such as `token_project = 'Aave'` or `token_project = 'Morpho'`.
  - secondary_trait: Balance-side trait such as supply or borrow; for token_project in (`Aave`, `Morpho`), borrow rows must be negated for net deployment exposure while supply rows stay positive.
  - token_underlying_symbol: Underlying asset symbol for balances that represent or wrap another asset.
  - token_balance_underlying: Balance expressed in underlying asset units when available.
  - token_balance_usd: USD value of the balance row; primary aggregation field for tracked AUM/deployment footprint analysis.
  - token_balance_eth: ETH-equivalent value of the balance row when ETH-denominated comparison is needed.
  - filter_balance: Currently negligible and should not be elevated into a primary query field.
clarifying_questions:
  - Is this a generic user wallet holdings question? If yes, use `etherfi_protocol_token_holders` instead.
  - Does the user explicitly mean AUM/managed/internal/protocol-controlled address balances or parent/product deployment footprint?
  - Is this a Cash balance question or a product deployment question?
  - Does the user want canonical TVL or tracked AUM/deployment balances?
  - Should results be grouped by token, category, chain, protocol/address_name, or parent product?
  - For product deployment analysis, which parent_symbol should be used?
  - For protocol-deployment analysis, which token_project should be filtered or grouped?
comparison_notes:
  - Compared with dune.ether_fi.result_etherfi_protocol_token_tvl, this table is for tracked balance/deployment footprint, not canonical product TVL or supply.
  - Compared with dune.ether_fi.result_etherfi_cash_events, this table is for Cash balance state and history, not spend, borrow, repay, cashback, liquidation, or event volume.
  - Compared with dune.ether_fi.result_etherfi_protocol_events, this table is for balance snapshots, not protocol event flow.
  - Generic wallet/address holding questions should use `etherfi_protocol_token_holders`, not this AUM dataset.
  - Explicit AUM/managed-address questions should focus on address and address_name; parent-product deployment questions should focus on parent_symbol, parent_address, and parent_name.
