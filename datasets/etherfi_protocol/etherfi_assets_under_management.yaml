  - "Show assets under management for this ether.fi-owned address 0x..."
  - "What are the latest balances for ether.fi cash address 0x...?"
  - "Who are the top 10 ether.fi Cash holders?"
  - "Show monthly ether.fi Cash holdings over the last 2 years."
  - "Group monthly Cash balances into liquidUSD, liquidETH, liquidBTC, and stables."
  - "Where is liquidETH deployed?"
  - "How much liquidETH is in Aave?"
  - "How much of liquidUSD is held in Aave?"
  - "How much liquidETH is deployed in Morpho?"
  - "How are liquidUSD funds distributed across protocols?"
  - "What balances make up the tracked deployment footprint of liquidBTC?"
