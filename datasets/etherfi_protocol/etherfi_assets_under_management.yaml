name: dune.ether_fi.result_etherfi_assets_under_management
display_name: Ether.fi Assets Under Management
description: Balance-state dataset for ether.fi-managed/internal/protocol-controlled addresses and parent/product deployment footprint analysis
refresh_interval_minutes: 60
freshness_timestamp_column: last_updated
source_query_id: 6147901
source_query_url: https://dune.com/queries/6147901
freshness_source_name: ether.fi Assets Under Management
table_name: dune.ether_fi.result_etherfi_assets_under_management
query_ready: true
query_patterns:
  - latest AUM balances by managed or internal address
  - current balances for explicit ether.fi-managed addresses
  - monthly Cash balance history
  - month-end Cash balances by token symbol or category
  - tracked product deployment footprint by parent_symbol
  - product balances by deployed protocol, managed address, chain, or token
address_column: address
date_column: day
balance_columns:
  - token_balance_raw
  - token_balance
  - token_balance_underlying
  - token_balance_usd
  - token_balance_eth
token_columns:
  - token_address
  - token_symbol
  - token_type
  - token_project
  - token_underlying_symbol
grain: one row per day, address, and token
query_notes:
  - This dataset supports two main modes: explicit AUM/managed-address balance lookups and parent/product deployment-footprint analysis.
  - In managed-address mode, use address, address_name, blockchain, token_symbol, token_balance, token_balance_underlying, token_balance_usd, token_balance_eth, and last_updated.
  - Do not use this dataset for generic user wallet holdings, invested-balance, or "how much does this address have in ether.fi?" prompts; use `etherfi_protocol_token_holders` for those.
  - Only use address-level filters here when the prompt explicitly says AUM, assets under management, managed by ether.fi, ether.fi-owned, protocol-owned, internal, treasury, address registry, address_name, address traits, or protocol-controlled assets.
  - In parent/product deployment-footprint mode, prefer filtering parent_symbol and then analyzing or aggregating balances such as token_balance_usd by token_project, address_name, blockchain, token_symbol, parent_name, or parent_address.
  - Example product filters include parent_symbol = 'liquidETH', parent_symbol = 'liquidUSD', and parent_symbol = 'liquidBTC'.
  - For protocol-deployment questions such as "How much liquidUSD is in Aave?", filter by token_project rather than address_name; token_project identifies the protocol where the balance is deployed.
  - For current lending protocols Aave and Morpho, net deployment exposure must negate borrow-side rows: when lower(token_project) in ('aave', 'morpho') and lower(secondary_trait) = 'borrow', use -token_balance_usd; otherwise use token_balance_usd.
  - For Aave and Morpho protocol-deployment aggregates, also apply the same supply-positive/borrow-negative treatment to token_balance_underlying, token_balance_eth, and other balance fields when those fields are used as exposure metrics.
  - parent_address, parent_name, and parent_symbol are critical for liquid vaults and similar products where multiple child addresses roll up into one parent product.
  - Many simple addresses, including most Cash-style addresses, have parent_address = address; vault-style products may have multiple child addresses per parent.
  - parent_address is usually defaulted to the Ethereum address for products with deployments on multiple chains.
  - LRT-style products such as weETH and weETHk can also follow the parent/product rollup pattern.
  - filter_balance is negligible for now and should not be treated as a primary query field.
  - "`address_name` is the balance-side classification context for the tracked address in this table."
  - "`address_name` is conceptually related to the canonical `name` classification in `dune.ether_fi.result_etherfi_addresses`, but the literal column names differ."
  - "For Cash-related balances, filter this dataset with `address_name = 'CASH'`."
  - "For monthly Cash balance history, use month-end snapshots: the latest available daily row in each calendar month."
  - "The Cash balance bucket preset is explicit and narrow: liquidUSD, liquidETH, liquidBTC, and stables where stables maps exact token symbols `USDC` and `USDC.e`."
  - Do not describe this table as the canonical source of ether.fi token or product TVL.
  - Use dune.ether_fi.result_etherfi_protocol_token_tvl for canonical product/token TVL, supply, supply_usd, and underlying supply questions.
  - AUM sums from this table are not expected to exactly match canonical token TVL because deployment coverage is partial and improved over time as missing protocols are added.
  - Do not confuse address_name classification with parent_name or parent_symbol rollup semantics.
semantic_notes:
  - "Use `dune.ether_fi.result_etherfi_cash_addresses` as the public registry for checking whether an address is an ether.fi Cash safe."
  - Use this dataset as the balance-state source only after explicit AUM/managed-address, Cash balance, or parent/product rollup context is known.
  - Use this dataset to understand where product funds are deployed across tracked protocols, addresses, and chains.
  - For protocol-level deployment questions, `token_project` is the protocol classification and is usually the correct filter or grouping field.
  - Lending protocol rows for Aave and Morpho need net exposure treatment because supply and borrow balances are both stored as positive raw balances.
  - Product deployment-footprint coverage is partial, typically around 80-95%, and is maintained over time as missing protocols are added.
  - For canonical token/product TVL, use `dune.ether_fi.result_etherfi_protocol_token_tvl` instead.
  - "AUM `address_name` and address-registry `name` represent related business meaning, but they should not be treated as the same literal field."
  - Cash balance use cases usually filter by `address_name = 'CASH'`; product deployment-footprint use cases usually filter by `parent_symbol`.
  - Managed/internal address balances answer what a tracked ether.fi AUM-scope address holds; generic user wallet holdings belong in `etherfi_protocol_token_holders`.
  - Parent/product deployment analysis answers where a product's tracked funds are deployed.
  - Balance-state questions belong here; event-volume and activity-flow questions belong in Cash events or protocol events datasets.
