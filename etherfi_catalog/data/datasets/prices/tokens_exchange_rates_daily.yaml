name: dune.ether_fi.result_tokens_exchange_rates_daily
display_name: Tokens Exchange Rates (Daily)
description: Daily aggregated token-to-underlying exchange-rate table with interval boundaries for forward-fill daily coverage.
refresh_interval_minutes: 60
freshness_timestamp_column: last_updated
source_query_id: 6156009
source_query_url: https://dune.com/queries/6156009
freshness_source_name: Tokens Exchange Rates (Daily)
table_name: dune.ether_fi.result_tokens_exchange_rates_daily
query_ready: true
query_patterns:
  - daily token underlying exchange rates
  - daily exchange-rate interval join
  - forward-fill daily exchange rates
grain: one row per token, underlying asset, blockchain, and daily exchange-rate interval
refresh cadence: hourly
accuracy label: high
completeness label: high
use_when:
  - when the user needs daily token-to-underlying exchange-rate coverage
  - when calculating daily underlying value from token balances
  - when daily forward-fill exchange-rate behavior is sufficient
do_not_use_when:
  - when the user needs direct USD token prices
  - when block-level or transaction-level rate intervals are required
important_columns:
  - day: start of the daily exchange-rate interval
  - token_address: token contract address
  - token_symbol: token symbol
  - token_blockchain: chain where the token address is interpreted
  - underlying_asset_address: underlying asset contract address
  - underlying_asset_symbol: symbol of the underlying asset
  - exchange_rate: token-to-underlying exchange rate for the daily interval
  - next_day: end of the daily interval used for forward-fill joins
  - last_updated: timestamp for freshness evaluation
query_notes:
  - "Use this table when daily exchange-rate coverage is needed."
  - "`next_day` is important because exchange rates change infrequently and often need forward-fill behavior."
  - "For daily interval joins, prefer `fact.day >= rates.day and fact.day < rates.next_day` when exact same-day rows may be sparse."
semantic_notes:
  - This is the daily aggregated version of `dune.ether_fi.result_tokens_rates_oracle_pegs`.
  - It is an exchange-rate table, not a USD price table.
  - It supports underlying-value calculations and daily price enrichment workflows.
caveats:
  - Do not use this as a substitute for raw USD price feeds.
  - If rate timing matters within a day, use the source exchange-rate table instead.
schema:
  - name: day
    type: timestamp
  - name: token_address
    type: varbinary
  - name: token_symbol
    type: varchar
  - name: token_blockchain
    type: varchar
  - name: underlying_asset_address
    type: varbinary
  - name: underlying_asset_symbol
    type: varchar
  - name: exchange_rate
    type: double
  - name: next_day
    type: timestamp
  - name: last_updated
    type: timestamp
related_datasets:
  - dune.ether_fi.result_tokens_rates_oracle_pegs
  - dune.ether_fi.result_tokens_prices_enriched_daily
search_keywords:
  - daily exchange rates
  - underlying asset
  - next_day join
  - forward fill
related_dashboards: []
